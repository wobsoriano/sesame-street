name: Maestro E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maestro-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Cache APK
        id: apk-cache
        uses: actions/cache@v4
        with:
          path: android/app/build/outputs/apk/release/app-release.apk
          key: apk-${{ hashFiles('app/**', 'package.json', 'app.json', '.maestro/**') }}

      - name: Install dependencies
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Expo prebuild (Android)
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android

      - name: Cache Gradle
        if: steps.apk-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/app/build.gradle') }}
          restore-keys: gradle-

      - name: Build release APK
        if: steps.apk-cache.outputs.cache-hit != 'true'
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-31-x86_64

      - name: Generate AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          ram-size: 2048M
          force-avd-creation: false
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run Maestro E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          ram-size: 2048M
          force-avd-creation: false
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save -camera-back none
          disable-animations: true
          script: |
            adb devices
            adb install android/app/build/outputs/apk/release/app-release.apk
            APP_ID=com.wobsoriano.sesamestreet TEST_EMAIL="${{ secrets.TEST_EMAIL }}" TEST_PASSWORD="${{ secrets.TEST_PASSWORD }}" ./run_android_e2e.sh com.wobsoriano.sesamestreet

      - name: Upload test artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          path: |
            report_attempt_*.xml
            screenshot_attempt_*.png
