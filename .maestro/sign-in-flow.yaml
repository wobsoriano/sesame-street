appId: ${APP_ID}
name: Sign in with Clerk native AuthView
---
- launchApp:
    clearState: true

# Wait for AuthView to render
- extendedWaitUntil:
    visible: "Email address"
    timeout: 15000

- tapOn: "Email address"
- inputText: ${TEST_EMAIL}

- tapOn: "Continue"

- extendedWaitUntil:
    visible: "Password"
    timeout: 10000

- tapOn: "Password"
- inputText: ${TEST_PASSWORD}

- tapOn: "Continue"

# Wait for signed-in state
- extendedWaitUntil:
    visible: "Welcome"
    timeout: 15000
