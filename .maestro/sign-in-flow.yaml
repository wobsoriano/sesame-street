appId: ${APP_ID}
name: Sign in with Clerk native AuthView
---
- launchApp:
    clearState: true

# Wait for native AuthView to render
- extendedWaitUntil:
    visible: "Enter your email"
    timeout: 15000

- tapOn: "Enter your email"
- inputText: ${TEST_EMAIL}

- tapOn: "Continue"

# After entering email, password field appears
- extendedWaitUntil:
    visible: "Enter your password"
    timeout: 10000

- tapOn: "Enter your password"
- inputText: ${TEST_PASSWORD}

- tapOn: "Continue"

# Wait for signed-in state
- extendedWaitUntil:
    visible: "Welcome"
    timeout: 15000
